apiVersion: apps/v1
kind: Deployment

metadata:
  name: afo-backend

spec:
  replicas: 3

  selector:
    matchLabels:
      app: afo-backend

  template:
    metadata:
      labels:
        app: afo-backend

    spec:
      containers:
      - name: afo-backend

        image: nuthan22/my-app:daf268b99c5a70b9fa6af587a21714620426a5a4

        imagePullPolicy: Always

        ports:
        - containerPort: 3000
