apiVersion: apps/v1
kind: Deployment

metadata:
  name: afo-backend

spec:
  replicas: 3

  selector:
    matchLabels:
      app: afo-backend

  template:
    metadata:
      labels:
        app: afo-backend

    spec:
      containers:
      - name: afo-backend

        image: nuthan22/my-app:8dffdea7142969cbfe6d3bc4837efbf289a4fa8f

        imagePullPolicy: Always

        ports:
        - containerPort: 3000
