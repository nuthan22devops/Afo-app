apiVersion: apps/v1
kind: Deployment

metadata:
  name: afo-backend

spec:
  replicas: 3

  selector:
    matchLabels:
      app: afo-backend

  template:
    metadata:
      labels:
        app: afo-backend

    spec:
      containers:
      - name: afo-backend

        image: nuthan22/my-app:9671485799c4533ba03468275890abea94423cc8

        imagePullPolicy: Always

        ports:
        - containerPort: 3000
