name: Afo-Cipipe

on: 
    push:
        branches: 
            - main
    env:
     DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
     
    
    
jobs:
    build:
        runs-on: ubuntu-latest
        steps: 
            - name: Checkout code
              uses: actions/checkout@v4            
            - name: Set up NodeJS
              uses: actions/setup-node@v3
              with: 
                node-version: '14'

            - name: Install NodeJS dependencies
              run: npm install
              
            - name: Build Docker Image
              run: docker build -t  nuthan22/my-app:${{ github.sha }} .
               - name: Log in to DockerHub
              run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "nuthan22" --password-stdin
            

