apiVersion: apps/v1
kind: Deployment

metadata:
  name: afo-backend

spec:
  replicas: 5

  selector:
    matchLabels:
      app: afo-backend

  template:
    metadata:
      labels:
        app: afo-backend

    spec:
      containers:
      - name: afo-backend

        image: nuthan22/my-app:197107137ff9a36016c7f9822e56e18f35aae802

        imagePullPolicy: Always

        ports:
        - containerPort: 3000
