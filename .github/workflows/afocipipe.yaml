name: Afo-CI-Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "nuthan22" --password-stdin

      - name: Build Docker Image
        run: docker build -t nuthan22/my-app:${{ github.sha }} ../

      - name: Push Docker Image
        run: docker push nuthan22/my-app:${{ github.sha }}

      - name: Update Deployment Image
        run: |
          sed -i "s|image: .*|image: nuthan22/my-app:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

       - name: Commit Manifest
         run: |
           git add k8s/deployment.yaml

           if git diff --cached --quiet; then
             echo "No changes"
             exit 0
           fi

          git commit -m "Update image to ${{ github.sha }}"
          git push
   
