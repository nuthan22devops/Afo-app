apiVersion: apps/v1
kind: Deployment

metadata:
  name: afo-backend

spec:
  replicas: 3

  selector:
    matchLabels:
      app: afo-backend

  template:
    metadata:
      labels:
        app: afo-backend

    spec:
      containers:
      - name: afo-backend

        image: nuthan22/my-app:e4fb1d1c04ce3f046e1ab4dcf151131aae54d90c

        imagePullPolicy: Always

        ports:
        - containerPort: 3000
